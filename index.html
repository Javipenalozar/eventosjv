<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Eventos JV</title>
    <meta name="description" content="Landings activas de Eventos JV.">
    <style>
      :root {
        color-scheme: light;
        --ink: #221b12;
        --muted: #6f675c;
        --paper: #fbf7ef;
        --card: #ffffff;
        --accent: #2f4a3b;
        --gold: #b9832d;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 32px;
        color: var(--ink);
        background: var(--paper);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(920px, 100%);
      }

      h1 {
        margin: 0 0 12px;
        color: var(--accent);
        font-family: Georgia, "Times New Roman", serif;
        font-size: clamp(3rem, 9vw, 6rem);
        line-height: 0.95;
      }

      p {
        max-width: 620px;
        margin: 0 0 28px;
        color: var(--muted);
        font-size: 1.1rem;
      }

      a {
        display: grid;
        gap: 8px;
        padding: 24px;
        border: 1px solid rgba(47, 74, 59, 0.16);
        border-radius: 8px;
        color: inherit;
        background: var(--card);
        text-decoration: none;
        box-shadow: 0 20px 60px rgba(34, 27, 18, 0.08);
      }

      strong {
        color: var(--accent);
        font-size: 1.35rem;
      }

      span {
        color: var(--gold);
        font-weight: 800;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Eventos JV</h1>
      <p>Experiencias, formaciones y eventos activos.</p>
      <a href="https://anahata.eventosjv.com/">
        <strong>Academia de Reiki Anahata</strong>
        <span>Nuevo grupo presencial inicia el 22 de julio</span>
      </a>
    </main>
  </body>
</html>
